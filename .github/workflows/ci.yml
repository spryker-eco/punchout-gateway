name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
    validation:
        name: "Validation"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version:
                    - '8.3'
                    - '8.4'

        env:
            APPLICATION_ENV: devtest
            APPLICATION_STORE: DE
            PROJECT: punchout-gateway

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: mbstring, intl
                  tools: composer:v2

            -   name: Get Composer Cache Directory
                id: composer-cache
                run: |
                    echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-composer-

            - name: Validate translation key parity
              run: |
                ref="data/translation/Zed/en_US.csv"
                failed=0
                ref_keys=$(cut -d'"' -f2 "$ref" | sort)
                for file in data/translation/Zed/*.csv; do
                  [[ "$file" == "$ref" ]] && continue
                  file_keys=$(cut -d'"' -f2 "$file" | sort)
                  missing=$(comm -23 <(echo "$ref_keys") <(echo "$file_keys"))
                  if [[ -n "$missing" ]]; then
                    echo "Missing keys in $file:"
                    echo "$missing" | sed 's/^/  - /'
                    failed=1
                  fi
                done
                exit $failed

            - name: Composer validate
              run: composer validate

            - name: Composer install
              run: composer install

            - name: Codeception Build
              run: |
                composer require codeception/module-asserts --dev
                vendor/bin/codecept build

            - name: Run CodeStyle checks
              run: composer cs-check
